services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hanziquest
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hanziquest']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - hanziquest_postgres:/var/lib/postgresql/data

volumes:
  hanziquest_postgres:
